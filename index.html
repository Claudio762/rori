<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Non sei mai sola</title>
<meta name="description" content="Un aiuto rapido per calmare ansia e attacchi di panico con la tecnica del radicamento 5-4-3-2-1.">

<!-- PWA: installazione su iPhone -->
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Qui, ora">
<meta name="theme-color" content="#fdf1f0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#f7dfe4;
    --bg-2:#ffb5cb;
    --ink:#4b3a40;
    --ink-soft:#8c6f76;
    --clay:#e39aa6;
    --clay-soft:#f3c9d1;
    --blue:#e39aa6;
    --surface:rgba(255,255,255,0.6);
    --ring:#4b3a40;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    height:100%;
    overscroll-behavior:none;
  }

  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    color:var(--ink);
    background:radial-gradient(120% 120% at 50% 0%, var(--bg-2) 0%, var(--bg-1) 60%);
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
  }

  .app{
    position:relative;
    width:100%;
    max-width:520px;
    height:100dvh;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:28px 24px calc(28px + env(safe-area-inset-bottom));
    text-align:center;
  }

  /* ambient breathing circle — the signature element */
  .breath{
    position:absolute;
    top:50%;
    left:50%;
    width:min(78vw,420px);
    height:min(78vw,420px);
    border-radius:50%;
    transform:translate(-50%,-50%) scale(0.72);
    background:radial-gradient(circle at 50% 45%, rgba(227,154,166,0.32), rgba(227,154,166,0.07) 60%, transparent 72%);
    pointer-events:none;
    animation:breathe 8s ease-in-out infinite;
    z-index:0;
  }
  @keyframes breathe{
    0%{transform:translate(-50%,-50%) scale(0.72);}
    50%{transform:translate(-50%,-50%) scale(1);}
    100%{transform:translate(-50%,-50%) scale(0.72);}
  }
  @media (prefers-reduced-motion: reduce){
    .breath{animation:none; transform:translate(-50%,-50%) scale(0.86);}
  }

  .content{
    position:relative;
    z-index:1;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }

  /* progress: five marks, one per sense-step */
  .progress{
    display:flex;
    gap:10px;
  }
  .progress .mark{
    width:9px;
    height:9px;
    border-radius:50%;
    background:rgba(46,59,54,0.18);
    transition:background 0.4s ease, transform 0.4s ease;
  }
  .progress .mark.done{ background:var(--clay); }
  .progress .mark.current{ background:var(--ink); transform:scale(1.3); }

  .eyebrow{
    font-size:14px;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    font-weight:500;
  }

  .count{
    font-family:'Fraunces',serif;
    font-optical-sizing:auto;
    font-weight:600;
    font-size:clamp(64px,22vw,104px);
    line-height:1;
    color:var(--ink);
  }

  .label{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:clamp(24px,6.5vw,32px);
    line-height:1.15;
    max-width:22ch;
  }

  .instruction{
    font-size:16px;
    color:var(--ink-soft);
    max-width:34ch;
    line-height:1.5;
  }

  /* text entry for the current step */
  .entry-form{
    width:100%;
    max-width:340px;
    display:flex;
    gap:10px;
  }
  .entry-input{
    flex:1;
    font-family:'Inter',system-ui,sans-serif;
    font-size:17px;
    color:var(--ink);
    background:var(--surface);
    border:2px solid rgba(46,59,54,0.22);
    border-radius:14px;
    padding:14px 16px;
    outline:none;
    transition:border-color 0.2s ease;
  }
  .entry-input:focus{
    border-color:var(--clay);
  }
  .entry-add{
    width:52px;
    border-radius:14px;
    background:var(--ink);
    color:var(--bg-1);
    font-size:22px;
    line-height:1;
    flex-shrink:0;
  }
  .entry-add:active{ transform:scale(0.94); }
  .entry-add:disabled{
    opacity:0.35;
  }

  .entries{
    width:100%;
    max-width:340px;
    display:flex;
    flex-direction:column;
    gap:8px;
    text-align:left;
  }
  .entry-item{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--surface);
    border-radius:12px;
    padding:10px 14px;
    font-size:15px;
    color:var(--ink);
    cursor:pointer;
    animation:popIn 0.25s ease;
  }
  @keyframes popIn{
    from{opacity:0; transform:translateY(4px);}
    to{opacity:1; transform:translateY(0);}
  }
  .entry-item .n{
    color:var(--clay);
    font-weight:600;
    font-family:'Fraunces',serif;
    flex-shrink:0;
  }
  .entry-item .t{
    flex:1;
    word-break:break-word;
  }
  .entry-item .x{
    color:var(--ink-soft);
    font-size:13px;
    flex-shrink:0;
  }

  .actions{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    margin-top:6px;
    min-height:96px;
    justify-content:flex-start;
  }

  button{
    font-family:'Inter',system-ui,sans-serif;
    font-size:16px;
    font-weight:600;
    border:none;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }

  .btn-primary{
    background:var(--ink);
    color:var(--bg-1);
    padding:16px 40px;
    border-radius:32px;
    letter-spacing:0.01em;
    transition:transform 0.2s ease, opacity 0.3s ease;
    opacity:0;
    pointer-events:none;
  }
  .btn-primary.visible{
    opacity:1;
    pointer-events:auto;
  }
  .btn-primary:active{ transform:scale(0.96); }

  .btn-ghost{
    background:none;
    color:var(--ink-soft);
    font-weight:500;
    font-size:14px;
    padding:8px 12px;
  }

  .top-bar{
    position:absolute;
    top:0; left:0; right:0;
    z-index:2;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 20px 0;
  }
  .top-bar button{
    background:none;
    color:var(--ink-soft);
    font-size:14px;
    padding:8px;
  }

  /* screens */
  .screen{ display:none; }
  .screen.active{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
    animation:fadeIn 0.5s ease;
  }
  @keyframes fadeIn{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }

  .intro-title{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:clamp(30px,8vw,40px);
    line-height:1.2;
    max-width:16ch;
  }
  .intro-sub{
    font-size:16px;
    color:var(--ink-soft);
    max-width:32ch;
    line-height:1.55;
  }

  .end-title{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:clamp(28px,7vw,36px);
    max-width:18ch;
  }
</style>
</head>
<body>

<div class="app">

  <div class="breath" id="breath"></div>

  <div class="top-bar">
    <button id="backBtn" style="visibility:hidden;">← indietro</button>
    <button id="restartBtn" style="visibility:hidden;">ricomincia</button>
  </div>

  <!-- Screen 0: intro -->
  <div class="screen active" id="screen-intro">
    <div class="content">
      <p class="eyebrow">Rori's safe place 😉</p>
      <h1 class="intro-title">Sei qui. Sei al sicuro amore.</h1>
      <p class="intro-sub">Facciamo un passo alla volta vita mia</p>
      <div class="actions" style="margin-top:14px;">
        <button class="btn-primary visible" onclick="goToStep(0)">Inizia</button>
      </div>
    </div>
  </div>

  <!-- Screen 1: steps -->
  <div class="screen" id="screen-steps">
    <div class="content">
      <div class="progress" id="progress"></div>
      <p class="eyebrow" id="eyebrow"></p>
      <div class="count" id="count">0/5</div>
      <h2 class="label" id="label">cose che vedi</h2>
      <p class="instruction" id="instruction"></p>
      <form class="entry-form" id="entryForm">
        <input class="entry-input" id="entryInput" type="text" placeholder="Scrivi qui..." autocomplete="off" autocorrect="off">
        <button type="submit" class="entry-add" id="entryAdd" disabled>+</button>
      </form>
      <div class="entries" id="entries"></div>
      <div class="actions">
        <button class="btn-primary" id="nextBtn" onclick="nextStep()">Avanti</button>
      </div>
    </div>
  </div>

  <!-- Screen 2: end -->
  <div class="screen" id="screen-end">
    <div class="content">
      <p class="eyebrow">Fatto</p>
      <h2 class="end-title">Hai fatto un giro completo principessa mia. Bene così.</h2>
      <p class="intro-sub">Resta qui ancora un momento, se ti va. Puoi ricominciare oppure fermarti qui o ancora meglio chiamami (((dalla rubrica))).</p>
      <div class="actions" style="margin-top:14px;">
        <button class="btn-primary visible" onclick="goToStep(0)">Rifai il giro</button>
        <button class="btn-ghost" onclick="goToIntro()">Torna all'inizio</button>
      </div>
    </div>
  </div>

</div>

<script>
  const steps = [
    { n: 5, label: "cose che vedo",      instruction: "Guardati intorno amore mio. Scrivi una cosa che vedi e invia, poi la prossima." },
    { n: 4, label: "cose che tocco",    instruction: "Nota la consistenza di ciò che hai vicino." },
    { n: 3, label: "cose che sento",     instruction: "Ascolta i suoni intorno a te, vicini o lontani che siano." },
    { n: 2, label: "odori che sento",    instruction: "Prova a distinguere un odore, anche leggero." },
    { n: 1, label: "sapore che sento",   instruction: "Nota un sapore in bocca, anche solo il tuo respiro dolcissimo o le tue labbra fragolose amore" },
  ];

  let stepIndex = 0;
  let entries = [];

  const screenIntro = document.getElementById('screen-intro');
  const screenSteps = document.getElementById('screen-steps');
  const screenEnd = document.getElementById('screen-end');
  const progressEl = document.getElementById('progress');
  const eyebrowEl = document.getElementById('eyebrow');
  const countEl = document.getElementById('count');
  const labelEl = document.getElementById('label');
  const instructionEl = document.getElementById('instruction');
  const entriesEl = document.getElementById('entries');
  const entryForm = document.getElementById('entryForm');
  const entryInput = document.getElementById('entryInput');
  const entryAdd = document.getElementById('entryAdd');
  const nextBtn = document.getElementById('nextBtn');
  const backBtn = document.getElementById('backBtn');
  const restartBtn = document.getElementById('restartBtn');

  function showScreen(el){
    [screenIntro, screenSteps, screenEnd].forEach(s => s.classList.remove('active'));
    el.classList.add('active');
  }

  function buildProgress(){
    progressEl.innerHTML = '';
    steps.forEach((s, i) => {
      const m = document.createElement('div');
      m.className = 'mark';
      if (i < stepIndex) m.classList.add('done');
      if (i === stepIndex) m.classList.add('current');
      progressEl.appendChild(m);
    });
  }

  function renderStep(){
    const s = steps[stepIndex];
    entries = [];
    buildProgress();
    eyebrowEl.textContent = `Passo ${stepIndex + 1} di 5`;
    labelEl.textContent = s.label;
    instructionEl.textContent = s.instruction;
    countEl.textContent = `0/${s.n}`;
    entriesEl.innerHTML = '';
    entryInput.value = '';
    entryAdd.disabled = true;
    entryForm.style.display = 'flex';
    nextBtn.classList.remove('visible');
    nextBtn.textContent = stepIndex === steps.length - 1 ? 'Concludi' : 'Avanti';
    backBtn.style.visibility = stepIndex === 0 ? 'hidden' : 'visible';
    restartBtn.style.visibility = 'visible';
    setTimeout(() => entryInput.focus(), 300);
  }

  function renderEntries(){
    entriesEl.innerHTML = '';
    entries.forEach((text, i) => {
      const item = document.createElement('div');
      item.className = 'entry-item';
      item.innerHTML = `<span class="n">${i + 1}</span><span class="t"></span><span class="x">togli</span>`;
      item.querySelector('.t').textContent = text;
      item.onclick = () => removeEntry(i);
      entriesEl.appendChild(item);
    });
  }

  function updateCount(){
    const s = steps[stepIndex];
    countEl.textContent = `${entries.length}/${s.n}`;
    if (entries.length >= s.n){
      nextBtn.classList.add('visible');
      entryForm.style.display = 'none';
    } else {
      nextBtn.classList.remove('visible');
      entryForm.style.display = 'flex';
    }
  }

  function addEntry(){
    const s = steps[stepIndex];
    const text = entryInput.value.trim();
    if (!text || entries.length >= s.n) return;
    entries.push(text);
    renderEntries();
    updateCount();
    entryInput.value = '';
    entryAdd.disabled = true;
    if (entries.length < s.n){
      entryInput.focus();
    } else {
      entryInput.blur();
    }
  }

  function removeEntry(i){
    entries.splice(i, 1);
    renderEntries();
    updateCount();
  }

  entryForm.addEventListener('submit', (e) => {
    e.preventDefault();
    addEntry();
  });
  entryInput.addEventListener('input', () => {
    entryAdd.disabled = entryInput.value.trim().length === 0;
  });

  function goToStep(i){
    stepIndex = i;
    showScreen(screenSteps);
    renderStep();
  }

  function nextStep(){
    if (stepIndex < steps.length - 1){
      goToStep(stepIndex + 1);
    } else {
      showScreen(screenEnd);
      backBtn.style.visibility = 'hidden';
      restartBtn.style.visibility = 'hidden';
    }
  }

  function goBack(){
    if (stepIndex > 0){
      goToStep(stepIndex - 1);
    }
  }

  function goToIntro(){
    showScreen(screenIntro);
    backBtn.style.visibility = 'hidden';
    restartBtn.style.visibility = 'hidden';
  }

  backBtn.onclick = goBack;
  restartBtn.onclick = goToIntro;

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>

</body>
</html>
